<script>
(function(){
  const frames = Array.from(document.querySelectorAll('.gallery-frame'));
  const dotsEl = document.getElementById('gcDots');
  const perPage = 3;
  const pages = Math.ceil(frames.length / perPage);
  let current = 0;

  for(let i = 0; i < pages; i++){
    const d = document.createElement('button');
    d.className = 'gc-dot';
    d.setAttribute('aria-label', 'Page ' + (i+1));
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  }

  function goTo(page){
    current = (page + pages) % pages;
    frames.forEach((f, i) => {
      f.style.display = (Math.floor(i / perPage) === current) ? 'flex' : 'none';
    });
    document.querySelectorAll('.gc-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  document.querySelector('.gc-prev').addEventListener('click', () => goTo(current - 1));
  document.querySelector('.gc-next').addEventListener('click', () => goTo(current + 1));

  goTo(0);
})();
</script>
