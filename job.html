<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Apply | Design Plus Assam</title>
<link rel="icon" href="images/site/favicon.png">
<link rel="stylesheet" href="css/style.css?v=64">
</head>
<body data-page="news">

<header id="site-header" data-include="header.html"></header>

<section class="hero hero-sm" id="top">
  <div class="hero-slide active" style="background-image:url('images/site/intro-bg.jpg')"></div>
  <div class="hero-content">
    <div class="eyebrow">Careers</div>
    <h1>Job Apply</h1>
    <div class="breadcrumb"><a href="index.html">Home</a> / <a href="notice.html">News</a> / <span>Job Apply</span></div>
  </div>
</section>

<section>
  <div class="container">
    <div class="form-card reveal">
      <div class="eyebrow">Join Our Team</div>
      <h3 style="margin-bottom:26px;">Apply For A Job</h3>
      <form data-fake-submit>
        <div class="form-row"><label>Full Name</label><input type="text" required></div>
        <div class="form-row"><label>Email</label><input type="email" required></div>
        <div class="form-row"><label>Position Applying For</label><input type="text"></div>
        <div class="form-row">
          <label>Upload Your CV</label>
          <input type="file" accept=".pdf,.doc,.docx">
          <div class="form-note">Max file size 200KB</div>
        </div>
        <button type="submit" class="btn btn-solid">Submit</button>
        <div class="form-status"></div>
      </form>
    </div>
  </div>
</section>

<footer id="site-footer" data-include="footer.html"></footer>
<script src="js/main.js?v=31"></script>
</body>
</html>
